# Trunk config for the AudioWorklet build (used by pkgs/plyphon-website-worklet.nix and local
# `trunk serve --config Trunk.worklet.toml web/worklet/<name>.html`). Same as Trunk.toml, plus a
# post-build hook that prepends a TextEncoder/TextDecoder polyfill to the wasm-bindgen glue - cpal
# loads that glue on the audio worklet thread, whose scope (notably in Firefox) lacks them. Kept
# separate from Trunk.toml so the default (legacy-backend) site is untouched.
[build]
target = "web/worklet/index.html"
public_url = "./"
filehash = false
# The post-build hook below rewrites the wasm-bindgen glue (to add the TextEncoder/TextDecoder
# polyfill) after Trunk computes subresource-integrity hashes, which would make the baked-in
# `integrity` attributes mismatch and block loading. Disable SRI for this (same-origin) build.
no_sri = true

[[hooks]]
stage = "post_build"
command = "bash"
command_arguments = ["web/worklet/prepend-polyfill.sh"]

[serve]
port = 8088
headers = { "Cross-Origin-Opener-Policy" = "same-origin", "Cross-Origin-Embedder-Policy" = "require-corp" }
