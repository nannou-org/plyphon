<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <title>plyphon: stream</title>
    <!-- Install the AudioContext-resume proxy before trunk's wasm module runs. -->
    <script src="audio.js"></script>
    <link data-trunk rel="copy-file" href="audio.js" />
    <link data-trunk rel="copy-file" href="style.css" />
    <link rel="stylesheet" href="style.css" />
    <link data-trunk rel="copy-file" href="../crates/examples/stream/assets/stream.wav" />
    <link
      data-trunk
      rel="rust"
      href="../crates/examples/stream/Cargo.toml"
      data-bin="example-stream"
      data-cargo-profile-release="wasm_release"
      data-wasm-opt="z"
      data-wasm-opt-params="--enable-bulk-memory --enable-reference-types --enable-multivalue --enable-tail-call --enable-nontrapping-float-to-int"
      data-initializer="initializer.js"
    />
  </head>
  <body class="loading">
    <div id="loading">
      <p id="loading-title">plyphon</p>
      <div id="loading-track"><div id="loading-bar"></div></div>
    </div>
    <main class="demo">
      <p class="title">stream</p>
      <p>Streams a WAV from storage in chunks and plays it with DiskIn.</p>
      <p class="hint">Click anywhere to start audio.</p>
      <a class="back" href="../">&larr; all examples</a>
    </main>
  </body>
</html>
