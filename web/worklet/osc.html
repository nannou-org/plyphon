<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <title>plyphon: osc</title>
    <!-- Install the AudioContext-resume proxy before trunk's wasm module runs. -->
    <script src="coi-serviceworker.min.js"></script>
    <script src="audio.js"></script>
    <link data-trunk rel="copy-file" href="../coi-serviceworker.min.js" />
    <link data-trunk rel="copy-file" href="../audio.js" />
    <link data-trunk rel="copy-file" href="../style.css" />
    <link rel="stylesheet" href="style.css" />
    <link
      data-trunk
      rel="rust"
      href="../../crates/examples/osc/Cargo.toml"
      data-bin="example-osc"
      data-cargo-features="audioworklet"
      data-cargo-profile-release="wasm_release"
      data-wasm-opt="z"
      data-wasm-opt-params="--enable-simd --enable-threads --enable-bulk-memory --enable-mutable-globals --enable-reference-types --enable-multivalue --enable-tail-call --enable-nontrapping-float-to-int"
      data-initializer="../initializer.js"
    />
  </head>
  <body class="loading">
    <div id="loading">
      <p id="loading-title">plyphon</p>
      <div id="loading-track"><div id="loading-bar"></div></div>
    </div>
    <main class="demo">
      <p class="title">osc</p>
      <p>Drives the engine through encoded SuperCollider OSC packets (no sockets).</p>
      <p class="hint">Click to start audio, then open the browser console to see the OSC command log.</p>
      <a class="back" href="../">&larr; all examples</a>
    </main>
  </body>
</html>
