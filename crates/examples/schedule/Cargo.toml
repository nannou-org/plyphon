[package]
name = "example-schedule"
version = "0.1.0"
publish = false
description = "A plyphon example: sample-accurate rhythm from time-tagged OSC bundles scheduled ahead of the audio clock."
authors.workspace = true
edition.workspace = true
homepage.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
# cpal is a direct dep: this example builds its own stream to drift-correct via `fill_at`.
cpal.workspace = true
example-audio.workspace = true
plyphon.workspace = true
plyphon-osc.workspace = true
rosc.workspace = true

# Web-only: cpal's WebAudio backend and the wasm panic hook. (The control tick uses the helper's
# `run_control`, which owns the web timer.)
[target.'cfg(target_arch = "wasm32")'.dependencies]
cpal = { workspace = true, features = ["wasm-bindgen"] }
console_error_panic_hook.workspace = true

[features]
# Build the web demo on cpal's AudioWorklet backend (see pkgs/plyphon-website.nix).
default = ["audioworklet"]
audioworklet = ["example-audio/audioworklet"]
