[package]
name = "example-stream"
version = "0.1.0"
publish = false
description = "A plyphon example: stream a WAV from storage in chunks and play it with DiskIn, via cpal."
authors.workspace = true
edition.workspace = true
homepage.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
example-audio.workspace = true
plyphon.workspace = true
plyphon-buffers.workspace = true
hound = "3"

# Web-only: the wasm panic hook, async task spawning, HTTP fetch, and a timer to feed the queue.
[target.'cfg(target_arch = "wasm32")'.dependencies]
console_error_panic_hook.workspace = true
wasm-bindgen-futures = "0.4"
gloo-net = { version = "0.6", default-features = false, features = ["http"] }
gloo-timers = "0.3"

[features]
# Build the web demo on cpal's AudioWorklet backend (see pkgs/plyphon-website.nix).
default = ["audioworklet"]
audioworklet = ["example-audio/audioworklet"]
