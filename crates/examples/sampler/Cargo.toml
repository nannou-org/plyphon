[package]
name = "example-sampler"
version = "0.1.0"
publish = false
description = "A plyphon example: implement a BufferSource (a WAV loader) and play a loaded sample, via cpal."
authors.workspace = true
edition.workspace = true
homepage.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
example-audio.workspace = true
plyphon.workspace = true
plyphon-buffers.workspace = true
hound = "3"

# Web-only: the wasm panic hook, async task spawning, and HTTP fetch for the sample.
[target.'cfg(target_arch = "wasm32")'.dependencies]
console_error_panic_hook.workspace = true
wasm-bindgen-futures = "0.4"
gloo-net = { version = "0.6", default-features = false, features = ["http"] }

[features]
# Build the web demo on cpal's AudioWorklet backend (see pkgs/plyphon-website.nix).
default = ["audioworklet"]
audioworklet = ["example-audio/audioworklet"]
