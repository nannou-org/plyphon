[package]
name = "example-wandering"
version = "0.1.0"
publish = false
description = "A generative burble: LFNoise1 wanders the pitch, LFNoise2 sweeps the filter, LFDNoise3 shimmers the amplitude."
authors.workspace = true
edition.workspace = true
homepage.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
example-audio.workspace = true
plyphon.workspace = true

# Web-only: the wasm panic hook for readable console errors.
[target.'cfg(target_arch = "wasm32")'.dependencies]
console_error_panic_hook.workspace = true

[features]
# Build the web demo on cpal's AudioWorklet backend (see pkgs/plyphon-website-worklet.nix).
audioworklet = ["example-audio/audioworklet"]
